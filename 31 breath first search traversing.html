<!DOCTYPE html>
<html lang="en">

<head>
    <title>breath first search traversing</title>
    <script>
        class node {
            constructor(val) {
                this.value = val
                this.left = null
                this.right = null
            }
        }
        class BSTree {
            constructor() {
                this.root = null
            }
            isRootEmpty() {
                return this.root === null
            }
            makeTree(val) {
                let newNode = new node(val)
                if (this.root === null) {
                    this.root = newNode
                } else {
                    this.insertNode(this.root, newNode)
                }
            }
            insertNode(root, newNode) {
                if (root.value > newNode.value) {
                    if (root.left === null) {
                        root.left = newNode
                    } else {
                        this.insertNode(root.left, newNode)
                    }
                } else {
                    if (root.right === null) {
                        root.right = newNode
                    } else {
                        this.insertNode(root.right, newNode)
                    }
                }
            }

            search(root, val) {
                if (root === null) {
                    return false
                } else if (root.value === val) {
                    return true
                } else if (root.value > val) {
                    return this.search(root.left, val)
                } else {
                    return this.search(root.right, val)
                }
            }

            preOrder(root) {
                if (root) {
                    // all left node then right                   
                    console.log(root.value)
                    this.preOrder(root.left)
                    this.preOrder(root.right)
                }

            }
            inOrder(root) {
                if (root) {
                    // left root right                   
                    this.inOrder(root.left)
                    console.log(root.value)
                    this.inOrder(root.right)
                }

            }
            postOrder(root) {
                if (root) {
                    // left right root 
                    this.postOrder(root.left)
                    this.postOrder(root.right)
                    console.log(root.value)
                }

            }
            BFStraversing() {
                // level by level traversing 
                let queue = []
                queue.push(this.root)
                while (queue.length) {
                    let current = queue.shift()
                    if (current.left) {
                        queue.push(current.left)
                    }
                    if (current.right) {
                        queue.push(current.right)
                    }
                    console.log(current.value)
                }
            }
        }
        let bst = new BSTree
        bst.makeTree(20)
        bst.makeTree(10)
        bst.makeTree(5)
        bst.makeTree(40)
        bst.makeTree(30)
        bst.makeTree(60)
        bst.makeTree(25)
        // console.log(bst.search(bst.root, 10))
        // console.log(bst)
        // console.log(bst.isRootEmpty())
        // bst.preOrder(bst.root)
        // bst.inOrder(bst.root)
        // bst.postOrder(bst.root)
        bst.BFStraversing()
    </script>
</head>
