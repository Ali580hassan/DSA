<!DOCTYPE html>
<html lang="en">

<head>
    <title>linked list</title>
    <script>

        class list {
            constructor(data) {
                this.head = {
                    value: data,
                    next: null
                }
                // intial ma jo head ha wohi tail b ho ga 
                this.tail = this.head
                this.size = 1
            }
            appendNode(nodeData) {
                let newNode = {
                    value: nodeData,
                    next: null
                }
                this.tail.next = newNode
                // jo hamari last node ha wohi tail b ho gi 
                this.tail = newNode
                this.size += 1
            }
        }

        let obj = new list(200)
        obj.appendNode(300)
        obj.appendNode(400)
        console.log(obj)
