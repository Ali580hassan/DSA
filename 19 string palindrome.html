<!DOCTYPE html>
<html lang="en">

<head>
    <title>string palindrome</title>
    <script>
        function palindrome(str) {
            let start = 0
            let end = str.length - 1
            while (end > start) {
                if (str[start] !== str[end]) {
                    return false
                }
                start++
                end--
            }
            return true
        }
        console.log(palindrome("level"))
    </script>
</head>
