<!DOCTYPE html>
<html lang="en">

<head>
    <title>Median of Two Sorted Arrays</title>
    <script>
        let nums1 = [2, 1, 4, 6, 3];
        let nums2 = [5, 8];

        // Sort arrays first
        nums1.sort((a, b) => a - b); // [1,2,3,4,6]
        nums2.sort((a, b) => a - b); // [5,8]

        let i = 0, j = 0;
        let merged = [];

        // Merge both arrays
        while (i < nums1.length && j < nums2.length) {
            if (nums1[i] < nums2[j]) {
                merged.push(nums1[i++]);
            } else {
                merged.push(nums2[j++]);
            }
        }

        while (i < nums1.length) merged.push(nums1[i++]);
        while (j < nums2.length) merged.push(nums2[j++]);

        console.log("Merged Array:", merged);

        // Median calculation
        let n = merged.length;
        let median;
        if (n % 2 !== 0) {
            median = merged[Math.floor(n / 2)];
        } else {
            median = (merged[n / 2 - 1] + merged[n / 2]) / 2;
        }

        console.log("Median:", median);
    </script>
</head>

</html>
