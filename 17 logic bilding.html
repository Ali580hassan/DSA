<!DOCTYPE html>
<html lang="en">

<head>
    <title>logic bulding</title>
    <script>
        let data = [1, 2, 3, 4, 5, 6]
        let count = 0
        let evenArray = []
        for (let i = 0; i < data.length; i++) {
            if (data[i] % 2) {
                evenArray.push(data[i] * 2)
                count++
            }
        }
        console.log(data)
        console.log("even num of array " + evenArray)
        console.log(count)

    </script>
</head>

<body>
    find even value from array , make double of every element and find array length manually
</body>

</html>
